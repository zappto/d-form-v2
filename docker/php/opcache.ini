opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=128
opcache.max_accelerated_files=10000
opcache.revalidate_freq=0

; JIT DISABLED: PHP JIT (tracing mode) is incompatible with FrankenPHP's
; ZTS (Zend Thread Safety) multi-threaded worker model and causes the PHP
; workers to crash before reaching frankenphp_handle_request().
; See: https://github.com/dunglas/frankenphp/issues
opcache.jit=off
opcache.jit_buffer_size=0
