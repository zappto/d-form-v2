memory_limit = 256M
post_max_size = 128M
upload_max_filesize = 100M
max_execution_time = 300
max_input_time = 300

; Error reporting — logs PHP errors to stderr so they appear in 'docker logs'
; This is essential for debugging FrankenPHP worker crashes
log_errors = On
error_log = /proc/self/fd/2
display_errors = Off
error_reporting = E_ALL
